<!DOCTYPE html>
<html>
<head>
    <title>Class Notes</title> <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; }
        iframe { width: 100vw; height: 100vh; border: none; display: none; }
        #clicker { position: fixed; width: 100%; height: 100%; cursor: default; z-index: 10; }
    </style>
</head>
<body>

    <div id="clicker" onclick="start()"></div>

    <iframe id="f" src="https://www.crazygames.com/embed/poxel-io" allow="autoplay; gamepad; keyboard; accelerated-graphics"></iframe>

    <script>
        function start() {
            document.getElementById('clicker').style.display = 'none';
            const f = document.getElementById('f');
            f.style.display = 'block';
            f.focus();
        }
    </script>
</body>
</html>
