<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyper-Dark Gaming Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow-x: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 70px;
            background: #0d0d0d;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            gap: 30px;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .sidebar-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666666;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .sidebar-icon:hover {
            color: #4CAF50;
            text-shadow: 0 0 10px #4CAF50;
        }

        /* Main Content */
        .main-content {
            margin-left: 70px;
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(90deg, #4CAF50, #2196F3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-bar {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-input {
            padding: 12px 20px;
            background: #151515;
            border: 1px solid #222;
            border-radius: 8px;
            color: #fff;
            width: 400px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .search-input:focus {
            border-color: #4CAF50;
        }

        .search-btn {
            padding: 12px 24px;
            background: #4CAF50;
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-btn:hover {
            box-shadow: 0 0 15px #4CAF50;
            transform: translateY(-2px);
        }

        .ai-toggle {
            padding: 12px 24px;
            background: #151515;
            border: 1px solid #4CAF50;
            border-radius: 8px;
            color: #4CAF50;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .ai-toggle:hover {
            background: #4CAF50;
            color: #000;
            box-shadow: 0 0 15px #4CAF50;
        }

        /* Video Player Section */
        .video-section {
            background: #151515;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .video-player {
            width: 100%;
            height: 500px;
            background: #000;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .video-player iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 8px;
        }

        /* Chanal UI */
        .chanal-ui {
            display: flex;
            gap: 15px;
        }

        .sub-dub-toggle {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toggle-btn {
            padding: 10px 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            color: #666;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .toggle-btn.active,
        .toggle-btn:hover {
            background: #4CAF50;
            color: #000;
            border-color: #4CAF50;
            box-shadow: 0 0 10px #4CAF50;
        }

        .episode-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, 40px);
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
            padding: 10px;
            background: #0d0d0d;
            border-radius: 8px;
        }

        .episode-btn {
            width: 40px;
            height: 40px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            color: #666;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .episode-btn:hover,
        .episode-btn.active {
            background: #4CAF50;
            color: #000;
            border-color: #4CAF50;
            box-shadow: 0 0 10px #4CAF50;
        }

        /* Anime Cards Grid */
        .cards-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 24px;
            margin-bottom: 20px;
            color: #4CAF50;
            text-shadow: 0 0 10px #4CAF50;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .anime-card {
            background: #151515;
            border: 1px solid #222;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .anime-card:hover {
            border-color: #4CAF50;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
            transform: translateY(-5px);
        }

        .card-image {
            width: 100%;
            height: 280px;
            object-fit: cover;
            background: #0d0d0d;
        }

        .card-content {
            padding: 15px;
        }

        .card-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .card-info {
            font-size: 12px;
            color: #666;
            display: flex;
            justify-content: space-between;
        }

        /* AI Assistant Panel */
        .ai-panel {
            position: fixed;
            right: -400px;
            top: 0;
            width: 400px;
            height: 100vh;
            background: #000;
            border-left: 2px solid #4CAF50;
            box-shadow: -5px 0 20px rgba(0, 0, 0, 0.8);
            transition: right 0.4s ease;
            z-index: 200;
            display: flex;
            flex-direction: column;
        }

        .ai-panel.active {
            right: 0;
        }

        .ai-header {
            padding: 20px;
            background: #0d0d0d;
            border-bottom: 1px solid #4CAF50;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ai-title {
            color: #4CAF50;
            font-size: 18px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }

        .ai-close {
            background: none;
            border: none;
            color: #4CAF50;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .ai-close:hover {
            text-shadow: 0 0 10px #4CAF50;
        }

        .ai-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            color: #4CAF50;
            font-size: 13px;
            line-height: 1.6;
        }

        .ai-message {
            margin-bottom: 15px;
            padding: 10px;
            background: #0d0d0d;
            border-left: 3px solid #4CAF50;
            border-radius: 4px;
        }

        .ai-message.user {
            border-left-color: #2196F3;
            color: #2196F3;
        }

        .ai-input-container {
            padding: 20px;
            background: #0d0d0d;
            border-top: 1px solid #4CAF50;
        }

        .ai-input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #4CAF50;
            border-radius: 6px;
            color: #4CAF50;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            outline: none;
        }

        .ai-input::placeholder {
            color: #2d5a2e;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0d0d0d;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #4CAF50;
        }

        /* Loading Spinner */
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 3px solid #333;
            border-top: 3px solid #4CAF50;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-icon" onclick="scrollToSection('home')" title="Home">🏠</div>
            <div class="sidebar-icon" onclick="scrollToSection('trending')" title="Trending">🔥</div>
            <div class="sidebar-icon" onclick="scrollToSection('popular')" title="Popular">⭐</div>
            <div class="sidebar-icon" onclick="scrollToSection('search')" title="Search">🔍</div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <div class="header" id="home">
                <div class="logo">Mongle anime </div>
                <div class="search-bar">
                    <input 
                        type="text" 
                        class="search-input" 
                        id="searchInput" 
                        placeholder="Search anime..."
                        onkeypress="if(event.key==='Enter') searchAnime()"
                    >
                    <button class="search-btn" onclick="searchAnime()">Search</button>
                    <button class="ai-toggle" onclick="toggleLanguage()" id="langToggle">normal</button>
                    <button class="ai-toggle" onclick="toggleAI()">AI Assistant</button>
                </div>
            </div>

            <!-- Video Player Section -->
            <div class="video-section" id="videoSection" style="display: none;">
                <div class="video-player">
                    <iframe 
                        id="videoIframe" 
                        allowfullscreen
                        sandbox="allow-forms allow-scripts allow-same-origin allow-presentation"
                    ></iframe>
                </div>
                
                <!-- Chanal UI -->
                <div class="chanal-ui">
                    <div class="sub-dub-toggle">
                        <button class="toggle-btn active" data-type="sub">origonal</button>
                        <button class="toggle-btn" data-type="dub">english</button>
                    </div>
                    <div class="episode-grid" id="episodeGrid">
                        <!-- Episodes will be generated here -->
                    </div>
                </div>
            </div>

            <!-- Search Results Section -->
            <div class="cards-section" id="searchResults" style="display: none;">
                <h2 class="section-title">Search Results</h2>
                <div class="cards-grid" id="searchGrid"></div>
            </div>

            <!-- Trending Section -->
            <div class="cards-section" id="trending">
                <h2 class="section-title">Trending Now (why Idonotknowhowtocodeyet why did i make this)</h2>
                <div class="cards-grid" id="trendingGrid">
                    <div class="loading">
                        <div class="spinner"></div>
                        Loading trending anime...
                    </div>
                </div>
            </div>

            <!-- Popular Section -->
            <div class="cards-section" id="popular">
                <h2 class="section-title">All Time Popular</h2>
                <div class="cards-grid" id="popularGrid">
                    <div class="loading">
                        <div class="spinner"></div>
                        Loading popular anime...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- AI Assistant Panel -->
    <div class="ai-panel" id="aiPanel">
        <div class="ai-header">
            <div class="ai-title">> AI_TERMINAL</div>
            <button class="ai-close" onclick="toggleAI()">×</button>
        </div>
        <div class="ai-messages" id="aiMessages">
            <div class="ai-message">
                > System initialized...<br>
                > Welcome to Hyper-Dark AI Assistant<br>
                > Type your message below to chat<br>
            </div>
        </div>
        <div class="ai-input-container">
            <input 
                type="text" 
                class="ai-input" 
                id="aiInput" 
                placeholder="> Enter your message..."
                onkeypress="if(event.key==='Enter') sendAIMessage()"
            >
        </div>
    </div>

    <script src="https://js.puter.com/v2/"></script>
    <script>
        // Global state
        let currentAnime = null;
        let currentEpisode = 1;
        let currentType = 'sub';
        let useEnglishTitles = true; // Default to English

        // Initialize Puter.js AI
        let puterAI = null;
        
        // Initialize the app
        async function init() {
            try {
                // Initialize Puter AI
                puterAI = puter.ai;
                
                // Load trending anime
                loadTrending();
                
                // Load popular anime
                loadPopular();
            } catch (error) {
                console.error('Initialization error:', error);
            }
        }

        // Fetch from Jikan API
        async function fetchJikan(endpoint) {
            try {
                const response = await fetch(`https://api.jikan.moe/v4/${endpoint}`);
                if (!response.ok) throw new Error('API request failed');
                return await response.json();
            } catch (error) {
                console.error('Jikan API error:', error);
                return null;
            }
        }

        // Load trending anime
        async function loadTrending() {
            const data = await fetchJikan('top/anime?filter=airing&limit=12');
            if (data && data.data) {
                document.getElementById('trendingGrid').animeData = data.data;
                renderCards(data.data, 'trendingGrid');
            }
        }

        // Load popular anime
        async function loadPopular() {
            const data = await fetchJikan('top/anime?filter=bypopularity&limit=12');
            if (data && data.data) {
                document.getElementById('popularGrid').animeData = data.data;
                renderCards(data.data, 'popularGrid');
            }
        }

        // Search anime
        async function searchAnime() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            const searchResults = document.getElementById('searchResults');
            const searchGrid = document.getElementById('searchGrid');
            
            searchResults.style.display = 'block';
            searchGrid.innerHTML = '<div class="loading"><div class="spinner"></div>Searching...</div>';

            // REMOVED LIMIT - Now fetches up to 25 results by default (Jikan API default)
            // To get even more, we can increase the limit or use pagination
            const data = await fetchJikan(`anime?q=${encodeURIComponent(query)}`);
            if (data && data.data) {
                searchGrid.animeData = data.data;
                renderCards(data.data, 'searchGrid');
                searchResults.scrollIntoView({ behavior: 'smooth' });
            } else {
                searchGrid.innerHTML = '<div class="loading">No results found</div>';
            }
        }

        // Render anime cards
        function renderCards(animeList, gridId) {
            const grid = document.getElementById(gridId);
            grid.innerHTML = '';

            animeList.forEach(anime => {
                const card = document.createElement('div');
                card.className = 'anime-card';
                card.onclick = () => selectAnime(anime);
                
                // Get the appropriate title based on language setting
                const displayTitle = getDisplayTitle(anime);
                
                // Get season and year info
                const seasonInfo = getSeasonInfo(anime);
                
                card.innerHTML = `
                    <img 
                        src="${anime.images.jpg.large_image_url}" 
                        alt="${displayTitle}"
                        class="card-image"
                        onerror="this.src='https://via.placeholder.com/200x280/151515/666?text=No+Image'"
                    >
                    <div class="card-content">
                        <div class="card-title">${displayTitle}</div>
                        <div class="card-info">
                            <span>⭐ ${anime.score || 'N/A'}</span>
                            <span>${anime.episodes || '?'} eps</span>
                        </div>
                        ${seasonInfo ? `<div style="font-size: 11px; color: #4CAF50; margin-top: 5px;">${seasonInfo}</div>` : ''}
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        // Get display title based on language preference
        function getDisplayTitle(anime) {
            if (useEnglishTitles) {
                // Try to get English title, fallback to title_english, then default title
                return anime.title_english || anime.title || 'Unknown Title';
            } else {
                // Use original/Japanese title
                return anime.title || anime.title_japanese || 'Unknown Title';
            }
        }

        // Get season and year information
        function getSeasonInfo(anime) {
            if (anime.season && anime.year) {
                // Capitalize first letter of season
                const season = anime.season.charAt(0).toUpperCase() + anime.season.slice(1);
                return `${season} ${anime.year}`;
            } else if (anime.year) {
                return `${anime.year}`;
            } else if (anime.aired && anime.aired.prop && anime.aired.prop.from) {
                // Fallback to aired date
                const year = anime.aired.prop.from.year;
                return year ? `${year}` : '';
            }
            return '';
        }

        // Toggle language
        function toggleLanguage() {
            useEnglishTitles = !useEnglishTitles;
            const button = document.getElementById('langToggle');
            
            if (useEnglishTitles) {
                button.textContent = 'Original';
                button.style.background = '#151515';
                button.style.color = '#4CAF50';
            } else {
                button.textContent = 'English';
                button.style.background = '#4CAF50';
                button.style.color = '#000';
            }
            
            // Re-render all visible cards with new language
            const trendingData = document.getElementById('trendingGrid').animeData;
            const popularData = document.getElementById('popularGrid').animeData;
            const searchData = document.getElementById('searchGrid').animeData;
            
            if (trendingData) renderCards(trendingData, 'trendingGrid');
            if (popularData) renderCards(popularData, 'popularGrid');
            if (searchData) renderCards(searchData, 'searchGrid');
        }

        // Select anime and show video player
        function selectAnime(anime) {
            currentAnime = anime;
            currentEpisode = 1;
            
            // Show video section
            const videoSection = document.getElementById('videoSection');
            videoSection.style.display = 'block';
            videoSection.scrollIntoView({ behavior: 'smooth' });
            
            // Generate episode buttons
            generateEpisodes(anime.episodes || 12);
            
            // Load first episode
            loadEpisode(1);
        }

        // Generate episode buttons
        function generateEpisodes(count) {
            const episodeGrid = document.getElementById('episodeGrid');
            episodeGrid.innerHTML = '';
            
            // AUTO-EPISODE SELECTOR: Use the exact episode count from the anime
            // If count is null/undefined, default to 12
            // Support up to 500 episodes for long-running series
            const totalEpisodes = count || 12;
            const maxEpisodes = Math.min(totalEpisodes, 500); // Support up to 500 episodes
            
            for (let i = 1; i <= maxEpisodes; i++) {
                const btn = document.createElement('button');
                btn.className = 'episode-btn';
                btn.textContent = i;
                btn.onclick = () => loadEpisode(i);
                
                if (i === 1) btn.classList.add('active');
                
                episodeGrid.appendChild(btn);
            }
        }

        // Load episode
        function loadEpisode(episodeNum) {
            currentEpisode = episodeNum;
            
            // Update active episode button
            const allBtns = document.querySelectorAll('.episode-btn');
            allBtns.forEach(btn => btn.classList.remove('active'));
            allBtns[episodeNum - 1]?.classList.add('active');
            
            // Update iframe source
            updateVideoSource();
        }

        // Update video source
        function updateVideoSource() {
            if (!currentAnime) return;
            
            const iframe = document.getElementById('videoIframe');
            const malId = currentAnime.mal_id;
            
            // Using megaplay.buzz streaming service
            // Format: https://megaplay.buzz/stream/mal/{mal_id}/{episode}/{type}
            iframe.src = `https://megaplay.buzz/stream/mal/${malId}/${currentEpisode}/${currentType}`;
        }

        // Toggle SUB/DUB
        document.querySelectorAll('.toggle-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentType = this.dataset.type;
                updateVideoSource();
            });
        });

        // Toggle AI Panel
        function toggleAI() {
            const aiPanel = document.getElementById('aiPanel');
            aiPanel.classList.toggle('active');
        }

        // Send AI message
        async function sendAIMessage() {
            const input = document.getElementById('aiInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            // Add user message
            addAIMessage(message, true);
            input.value = '';
            
            try {
                // Use Puter.js AI
                const response = await puterAI.chat(message);
                
                // Add AI response
                addAIMessage(response || 'AI response received', false);
            } catch (error) {
                console.error('AI Error:', error);
                addAIMessage('Error: Unable to process your request. AI service may be unavailable.', false);
            }
        }

        // Add message to AI chat
        function addAIMessage(text, isUser) {
            const messagesDiv = document.getElementById('aiMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `ai-message ${isUser ? 'user' : ''}`;
            messageDiv.textContent = `> ${isUser ? 'You' : 'AI'}: ${text}`;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Scroll to section
        function scrollToSection(sectionId) {
            const section = document.getElementById(sectionId);
            if (section) {
                section.scrollIntoView({ behavior: 'smooth' });
            }
        }

        // Initialize app on load
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
