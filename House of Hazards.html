<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House of Hazards </title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #000; 
        }
        iframe { 
            border: none; 
            width: 100%; 
            height: 100%; 
        }
        #status {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #444;
            font-family: sans-serif;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div id="status">ESTABLISHING SECURE CONNECTION...</div>

    <iframe 
        id="game-frame"
        src="https://house-of-hazards.pages.dev/" 
        allowfullscreen="true">
    </iframe>

    <script>
        // Emergency backup: If the first link fails, it swaps to another Cloudflare mirror
        const frame = document.getElementById('game-frame');
        frame.onerror = function() {
            frame.src = "https://hoh-unblocked.pages.dev/";
        };
    </script>

</body>
</html>
