<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House of Hazards Loader</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #000; }
        iframe { border: none; width: 100%; height: 100%; }
        #loading { color: white; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: sans-serif; }
    </style>
</head>
<body>

    <div id="loading">connecting to your MONGLE game pls wait this will take only like 5 secs or less</div>

    <iframe src="https://raw.githack.com/1000unblockedgames/HouseOfHazards/main/index.html" 
            onload="document.getElementById('loading').style.display='none';"></iframe>

</body>
</html>
